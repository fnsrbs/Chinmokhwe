<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yongin Chinmokhwe AR Event</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; width: 100vw; height: 100vh; position: fixed; background-color: #000; }
        
        /* 미리보기 배경 이미지 설정 */
        #ar-scene-container { 
            width: 100%; 
            height: 100%; 
            /* 여기에 보물지도 이미지 경로를 넣으세요 */
            background-image: url('./map_bg.jpg'); 
            background-size: cover;
            background-position: center;
        }

        #ui {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            color: white; background: rgba(88, 47, 14, 0.85); /* 보물지도 느낌의 갈색톤 */
            padding: 12px 24px; border-radius: 30px; text-align: center;
            font-family: 'Nanum Gothic', sans-serif; z-index: 1000; pointer-events: none;
            font-size: 16px; font-weight: bold; width: 80%; max-width: 300px;
            border: 2px solid #dda15e;
        }

        /* 스캔 안내 문구 애니메이션 */
        .found { background: rgba(40, 167, 69, 0.9) !important; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform: translateX(-50%) scale(1); } to { transform: translateX(-50%) scale(1.05); } }

        /* AR 실행 시 배경 이미지를 가리지 않도록 설정 */
        a-scene { width: 100%; height: 100%; opacity: 0; transition: opacity 1s; }
        a-scene.v-visible { opacity: 1; }
    </style>
</head>
<body>

    <div id="ui">보물 카드를 카메라로 비춰보세요!</div>

    <div id="ar-scene-container">
        <a-scene 
            id="main-scene"
            mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
            embedded vr-mode-ui="enabled: false" loading-screen="enabled: false"
            device-orientation-permission-ui="enabled: false"
            color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights">
            
            <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        </a-scene>
    </div>

    <script>
        const sceneEl = document.querySelector('#main-scene');
        const ui = document.querySelector('#ui');

        // 카메라가 준비되면 장면을 부드럽게 표시
        sceneEl.addEventListener("renderstart", () => {
            sceneEl.classList.add("v-visible");
        });

        const SECRET_CODES = [
            "K9F7", "W6P1", "H8J4", "P5B2", "C4A1", "D2Y7", "G8M5", "X9P2", "R1C4", "T5H9",
            "H3N8", "M1V9", "C9A2", "R4T1", "E4N8", "V3Q9", "N2K7", "S8P9", "U1R8", "V1K4",
            "D4S7", "Z9V7", "W2D1", "E1R9", "K4J3", "Z7W4", "B8S5", "M7C3", "G6T5", "L9C1"
        ];

        for (let i = 0; i < 30; i++) {
            const entity = document.createElement('a-entity');
            entity.setAttribute('mindar-image-target', `targetIndex: ${i}`);
            
            const image = document.createElement('a-image');
            image.setAttribute('src', `./images/${i + 1}.png`);
            image.setAttribute('position', '0 0 0.1');
            image.setAttribute('height', '0.6');
            image.setAttribute('width', '0.9');
            
            entity.appendChild(image);
            
            entity.addEventListener("targetFound", () => {
                const couponCode = SECRET_CODES[i];
                ui.innerText = `✨ 보물 발견! 잠시만 기다리세요... ✨`;
                ui.classList.add("found");
                
                setTimeout(() => {
                    window.location.href = `result.html?num=${couponCode}`;
                }, 1500);
            });

            sceneEl.appendChild(entity);
        }
    </script>
</body>
</html>
