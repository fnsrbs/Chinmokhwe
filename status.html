<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yongin Chinmokhwe - 보물 현황</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; background: #f4f1ea; margin: 0; padding: 15px; }
        h1 { color: #582f0e; font-size: 20px; margin-bottom: 20px; }
        
        .grid { 
            display: grid; 
            /* 모바일 기본 3열 구성 */
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            max-width: 600px; 
            margin: 0 auto; 
        }

        .treasure-card { 
            position: relative; background: white; border-radius: 8px; 
            padding: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            border: 1px solid #ddd;
        }

        .treasure-card img { width: 100%; border-radius: 4px; display: block; }
        .treasure-name { font-size: 11px; font-weight: bold; margin-top: 5px; color: #333; }
        
        /* 발견된 보물 처리 (X 표시) */
        .found img { filter: grayscale(1); opacity: 0.3; }
        .found::after {
            content: '❌'; position: absolute; top: 30%; left: 50%;
            transform: translate(-50%, -50%); font-size: 35px; z-index: 2;
        }
        
        .discovery-time { 
            font-size: 9px; color: #e63946; font-weight: bold; 
            margin-top: 3px; height: 12px; line-height: 12px;
        }

        /* PC 버전에서는 5~6열로 보이게 */
        @media (min-width: 600px) {
            .grid { grid-template-columns: repeat(6, 1fr); }
        }
    </style>
</head>
<body>
    <h1>🏴‍☠️ 실시간 보물 발견 현황 (0/30)</h1>
    <div id="status-grid" class="grid"></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxkzUG6hsfp53vS0OEO6T76_puAQyho05QOdo6GlvAuksITylRdHAA10EI1189ZuTHJ/exec";

        async function fetchStatus() {
            try {
                const response = await fetch(SCRIPT_URL);
                const fullData = await response.json();
                
                // 보물 30개만 딱 잘라서 가져오기
                const data = fullData.slice(0, 30);
                const grid = document.getElementById('status-grid');
                let foundCount = 0;

                grid.innerHTML = "";

                data.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'treasure-card';
                    
                    const time = item['사용시각'] || item['discovery_time']; 
                    const isFound = time && time.toString().trim() !== "";

                    if (isFound) {
                        card.classList.add('found');
                        foundCount++;
                    }

                    card.innerHTML = `
                        <img src="./images/${index + 1}.png" onerror="this.src='https://via.placeholder.com/100?text=${index+1}'">
                        <div class="treasure-name">${index + 1}번 보물</div>
                        <div class="discovery-time">${isFound ? formatTime(time) : ''}</div>
                    `;
                    grid.appendChild(card);
                });

                // 상단 제목에 현재 몇 개 찾았는지 업데이트
                document.querySelector('h1').innerText = `🏴‍☠️ 실시간 보물 발견 현황 (${foundCount}/30)`;

            } catch (e) {
                console.error("데이터 로드 실패:", e);
            }
        }

        function formatTime(dateStr) {
            const date = new Date(dateStr);
            if (isNaN(date)) return dateStr; 
            // 시:분 만 표시 (공간 절약)
            return date.getHours() + ":" + (date.getMinutes() < 10 ? '0' : '') + date.getMinutes();
        }

        setInterval(fetchStatus, 10000); // 10초마다 갱신
        fetchStatus();
    </script>
</body>
</html>
